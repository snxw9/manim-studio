name: Update Native Libraries

on:
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        run: sudo apt-get install -y zstd binutils

      - name: Download Termux package index
        run: |
          wget -q \
            "https://packages.termux.dev/apt/termux-main/dists/stable/main/binary-aarch64/Packages.gz" \
            -O packages.gz
          echo "Index downloaded"

      - name: Extract proot AND proot-loader from Termux package
        run: |
          # Find and download proot package
          PROOT_PATH=$(zcat packages.gz | \
            awk '/^Package: proot$/{found=1} found && /^Filename:/{print $2; exit}')
          echo "proot package: $PROOT_PATH"
          wget -q "https://packages.termux.dev/apt/termux-main/${PROOT_PATH}" -O proot.deb

          # Extract everything from the .deb
          mkdir proot_extract && cd proot_extract
          ar x ../proot.deb
          if [ -f data.tar.xz ]; then
            tar xf data.tar.xz
          elif [ -f data.tar.zst ]; then
            zstd -d data.tar.zst -o data.tar && tar xf data.tar
          fi

          echo "=== Contents of extracted package ==="
          find . -type f | sort

          # Extract proot main binary
          PROOT_BIN=$(find . -type f -name "proot" ! -name "*loader*" | head -1)
          echo "proot binary: $PROOT_BIN"
          cp "$PROOT_BIN" ../proot-main

          # Extract proot-loader (the critical missing piece)
          # This is what proot needs pre-placed to avoid runtime chmod
          LOADER_BIN=$(find . -type f -name "proot-loader" | grep -v "32" | head -1)
          if [ -z "$LOADER_BIN" ]; then
            LOADER_BIN=$(find . -type f | grep "loader" | grep -v "32" | head -1)
          fi
          echo "proot-loader binary: $LOADER_BIN"
          cp "$LOADER_BIN" ../proot-loader

          cd ..
          file proot-main
          file proot-loader
          ls -lh proot-main proot-loader

      - name: Download libtalloc and libandroid-shmem
        run: |
          for PKG in libtalloc libandroid-shmem; do
            PKG_PATH=$(zcat packages.gz | \
              awk -v p="$PKG" '/^Package: /{found=($2==p)} found && /^Filename:/{print $2; exit}')
            echo "$PKG path: $PKG_PATH"
            wget -q "https://packages.termux.dev/apt/termux-main/${PKG_PATH}" -O ${PKG}.deb

            mkdir ${PKG}_extract && cd ${PKG}_extract
            ar x ../${PKG}.deb
            if [ -f data.tar.xz ]; then tar xf data.tar.xz
            elif [ -f data.tar.zst ]; then zstd -d data.tar.zst -o data.tar && tar xf data.tar
            fi
            find . -name "*.so*" -type f
            SO=$(find . -name "*.so*" -type f | head -1)
            echo "Found: $SO"
            cp "$SO" ../${PKG}-raw.so
            cd ..
          done

      - name: Patch proot dependency name
        run: |
          sudo apt-get install -y patchelf

          # proot looks for libtalloc.so.2 but Android jniLibs requires lib*.so
          # (no version suffix). Patch proot's ELF to look for libtalloc.so instead.
          patchelf --replace-needed libtalloc.so.2 libtalloc.so proot-main

          echo "=== proot dependencies after patch ==="
          patchelf --print-needed proot-main

      - name: Install all binaries to jniLibs
        run: |
          mkdir -p android/app/src/main/jniLibs/arm64-v8a

          # Main proot binary
          cp proot-main android/app/src/main/jniLibs/arm64-v8a/libproot.so

          # proot-loader — pre-placed so proot never needs to chmod at runtime
          # Android extracts all lib*.so to nativeLibraryDir and marks them executable
          cp proot-loader android/app/src/main/jniLibs/arm64-v8a/libproot-loader.so

          # Runtime dependencies
          cp libtalloc-raw.so android/app/src/main/jniLibs/arm64-v8a/libtalloc.so
          cp libandroid-shmem-raw.so android/app/src/main/jniLibs/arm64-v8a/libandroid-shmem.so

          echo "=== Final jniLibs ==="
          ls -lh android/app/src/main/jniLibs/arm64-v8a/
          for f in android/app/src/main/jniLibs/arm64-v8a/*.so; do
            echo "$f: $(file $f | cut -d: -f2)"
          done

      - name: Commit
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add android/app/src/main/jniLibs/arm64-v8a/
          git diff --staged --quiet && echo "No changes" || \
            git commit -m "chore: add proot-loader — eliminates runtime chmod requirement"
          git push
